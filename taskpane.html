<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文書校正アシスタント</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css">
</head>
<body>
  <div id="app">

    <!-- ヘッダー -->
    <div class="header">
      <span class="header-icon">✏️</span>
      <span class="header-title">文書校正アシスタント</span>
    </div>

    <!-- 設定セクション -->
    <div class="section">
      <div class="section-title">設定</div>

      <!-- AI サービス選択 -->
      <label class="label">AI サービス</label>
      <div class="service-tabs">
        <button class="service-tab active" data-service="openai">OpenAI</button>
        <button class="service-tab" data-service="gemini">Gemini</button>
        <button class="service-tab" data-service="claude">Claude</button>
      </div>

      <!-- OpenAI 設定 -->
      <div class="service-panel" id="panel-openai">
        <label class="label">OpenAI API キー</label>
        <div class="input-row">
          <input type="password" id="apikey-openai" placeholder="sk-proj-..." autocomplete="off">
          <button class="btn-icon toggle-key-btn" data-target="apikey-openai" title="表示/非表示">👁</button>
        </div>
        <label class="label">モデル</label>
        <div class="input-row">
          <select id="model-openai">
            <optgroup label="GPT-5 系">
              <option value="gpt-5">gpt-5</option>
              <option value="gpt-5-mini">gpt-5-mini</option>
            </optgroup>
            <optgroup label="GPT-4.1 系">
              <option value="gpt-4.1">gpt-4.1</option>
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="gpt-4.1-nano">gpt-4.1-nano</option>
            </optgroup>
            <optgroup label="GPT-4o 系">
              <option value="gpt-4o" selected>gpt-4o</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
            </optgroup>
            <optgroup label="その他">
              <option value="gpt-4-turbo">gpt-4-turbo</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </optgroup>
          </select>
          <button id="fetch-models-openai" class="btn-icon" title="利用可能なモデルを取得">↻</button>
        </div>
        <div id="hint-openai" class="hint"></div>
      </div>

      <!-- Gemini 設定 -->
      <div class="service-panel" id="panel-gemini" style="display:none">
        <label class="label">Gemini API キー</label>
        <div class="input-row">
          <input type="password" id="apikey-gemini" placeholder="AIza..." autocomplete="off">
          <button class="btn-icon toggle-key-btn" data-target="apikey-gemini" title="表示/非表示">👁</button>
        </div>
        <label class="label">モデル</label>
        <div class="input-row">
          <select id="model-gemini">
            <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
          </select>
          <button id="fetch-models-gemini" class="btn-icon" title="利用可能なモデルを取得">↻</button>
        </div>
        <div id="hint-gemini" class="hint"></div>
      </div>

      <!-- Claude 設定 -->
      <div class="service-panel" id="panel-claude" style="display:none">
        <label class="label">Claude API キー</label>
        <div class="input-row">
          <input type="password" id="apikey-claude" placeholder="sk-ant-..." autocomplete="off">
          <button class="btn-icon toggle-key-btn" data-target="apikey-claude" title="表示/非表示">👁</button>
        </div>
        <label class="label">モデル</label>
        <div class="input-row">
          <select id="model-claude">
            <optgroup label="Claude 4 系">
              <option value="claude-opus-4-5">claude-opus-4-5</option>
              <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
            </optgroup>
            <optgroup label="Claude 3.7 系">
              <option value="claude-3-7-sonnet-20250219" selected>claude-3-7-sonnet-20250219</option>
            </optgroup>
            <optgroup label="Claude 3.5 系">
              <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet-20241022</option>
              <option value="claude-3-5-haiku-20241022">claude-3-5-haiku-20241022</option>
            </optgroup>
            <optgroup label="Claude 3 系">
              <option value="claude-3-opus-20240229">claude-3-opus-20240229</option>
              <option value="claude-3-haiku-20240307">claude-3-haiku-20240307</option>
            </optgroup>
          </select>
          <button id="fetch-models-claude" class="btn-icon" title="利用可能なモデルを取得">↻</button>
        </div>
        <div id="hint-claude" class="hint"></div>
      </div>

      <div class="btn-row">
        <button id="save-settings" class="btn-secondary">保存</button>
        <span id="settings-saved" class="saved-msg" style="display:none">✓ 保存しました</span>
      </div>
    </div>

    <!-- 校正実行セクション -->
    <div class="section">
      <div class="section-title">校正実行</div>
      <p class="description">Word 文書全体のテキストを取得し、選択した AI サービスで校正します。<br>結果はこのパネルに一覧表示されます。</p>
      <button id="proofread-btn" class="btn-primary" disabled>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
        <span id="btn-text">文書を校正する</span>
      </button>
    </div>

    <!-- 進捗表示 -->
    <div id="progress-area" style="display:none" class="progress-area">
      <div class="progress-spinner"></div>
      <div id="progress-text" class="progress-text">処理中...</div>
    </div>

    <!-- エラー表示 -->
    <div id="error-area" style="display:none" class="error-area">
      <div class="error-title">⚠️ エラー</div>
      <div id="error-message" class="error-message"></div>
    </div>

    <!-- 校正結果 -->
    <div id="results-section" style="display:none" class="section">
      <div class="results-header">
        <div class="section-title">校正結果</div>
        <button id="copy-btn" class="btn-small">コピー</button>
      </div>
      <div id="results-meta" class="results-meta"></div>
      <div id="results-content" class="results-content"></div>
    </div>

  </div>
  <script src="taskpane.js"></script>
</body>
</html>
